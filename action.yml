name: 'DoesQA Trigger'
description: 'Triggers a test run in DoesQA and waits for it to complete'
inputs:
  key:
    description: 'Your DoesQA CI/CD key'
    required: true
  accountId:
    description: 'Your DoesQA Account ID'
    required: true
  label:
    description: 'Label for the test run'
  withAll:
    description: 'Flow Tags to include'
    required: false
  withoutAny:
    description: 'Any Flow Tags to exclude'
    required: false
    default: 'wip'
  values:
    description: 'Values to pass to the test run'
    required: false
  wait:
    description: 'Wait for the test run to complete'
    required: false
    default: 'true'
  timeout:
    description: 'Timeout in seconds'
    required: false
    default: '1200'
  concurrency:
    description: 'Number of concurrent test runs'
    required: false
    default: '0'
  recipe:
    description: 'Recipe to use for the test run'
    required: false
  testsTagged:
    description: 'Tests tagged with this tag will be run'
    required: false
  github-token:
    description: 'GitHub token for creating a Check Run on the commit. Defaults to the automatic workflow token.'
    required: false
    default: ${{ github.token }}

outputs:
  status:
    description: 'Final status of the DoesQA test run (e.g. passed, failed, terminated)'
  report-url:
    description: 'URL to the DoesQA report for this run'

runs:
  using: 'node20'
  main: 'dist/index.js'
branding:
  icon: 'check-circle'
  color: purple