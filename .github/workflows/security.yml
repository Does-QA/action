name: Security

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Audit and fix
        id: audit
        run: |
          BEFORE=$(npm audit --json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.total || 0")

          if [ "$BEFORE" -eq 0 ]; then
            echo "No vulnerabilities found."
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $BEFORE vulnerabilities. Attempting fix..."
          npm audit fix || true

          AFTER=$(npm audit --json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).metadata?.vulnerabilities?.total || 0")

          if git diff --quiet package.json package-lock.json; then
            echo "npm audit fix made no changes."
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Fixed: $BEFORE → $AFTER vulnerabilities"
            echo "fixed=true" >> "$GITHUB_OUTPUT"
            echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "after=$AFTER" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.audit.outputs.fixed == 'true'
        run: npm run build

      - name: Bump patch version
        if: steps.audit.outputs.fixed == 'true'
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1 || echo "v0.0.0")
          TAGGED_VERSION="${LATEST_TAG#v}"

          MAJOR=$(echo "$TAGGED_VERSION" | cut -d. -f1)
          MINOR=$(echo "$TAGGED_VERSION" | cut -d. -f2)
          PATCH=$(echo "$TAGGED_VERSION" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          node -e "const p=require('./package.json'); p.version='$NEW_VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit, tag and release
        if: steps.audit.outputs.fixed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json dist/
          git commit -m "release: ${VERSION} — security fixes"
          git push

          git tag "$VERSION"
          git push origin "$VERSION"

          MAJOR="v$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1)"
          git tag -f "$MAJOR"
          git push origin "$MAJOR" --force

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Security patch: fixed ${{ steps.audit.outputs.before }} → ${{ steps.audit.outputs.after }} vulnerabilities via \`npm audit fix\`." \
            --latest
